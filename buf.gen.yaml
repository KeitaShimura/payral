version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/KeitaShimura/payral/backend/gen
inputs:
  - directory: proto
plugins:
  - remote: buf.build/protocolbuffers/go
    out: backend/gen
    opt:
      - paths=source_relative
  - remote: buf.build/connectrpc/go
    out: backend/gen
    opt:
      - paths=source_relative
  - remote: buf.build/protocolbuffers/dart
    out: mobile/lib/gen
